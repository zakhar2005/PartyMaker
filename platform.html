<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyMaker Platform Integration</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container stack" style="margin-top:2rem">
    <section class="panel">
      <h1>Практика №6: QR API + TMDB API</h1>
      <p class="hint">Платформа берёт данные фильма из TMDB и формирует QR через ваше API.</p>
      <div class="grid grid--3">
        <label>Название фильма (или оставьте пустым, если есть ID)
          <input id="title" type="text" placeholder="Интерстеллар" />
        </label>
        <label>TMDB ID (опционально)
          <input id="tmdbId" type="number" placeholder="157336" />
        </label>
      </div>
      <button id="integrateBtn" class="btn btn--primary" style="margin-top:.8rem;">Запустить интеграцию</button>
    </section>

    <section class="panel">
      <h2>Результаты интеграции</h2>
      <pre id="resultBox" class="code-box">Ожидание запроса...</pre>
    </section>
  </main>
  <script src="platform.js"></script>
</body>
</html>
